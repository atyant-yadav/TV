<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch YouTube videos together in perfect sync with friends">

    <!-- iOS Safari Background Audio Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>TV - Watch Together</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TV - Watch Together</h1>
            <p><span class="status-indicator"></span>Watch together in perfect sync</p>
        </div>

        <div class="content">
            <div class="input-group">
                <input
                    type="text"
                    id="videoUrl"
                    placeholder="Paste video/audio URL here (YouTube, Spotify, Vimeo, etc.)..."
                    autocomplete="off"
                    maxlength="200">
                <button id="loadVideo" class="btn btn-primary">
                    <span class="icon-load"></span>
                    Load Video
                </button>
            </div>

            <div class="player-wrapper">
                <div id="player"></div>
            </div>

            <div class="controls">
                <button id="play" class="btn btn-play">
                    <span class="icon-play"></span>
                    Play
                </button>
                <button id="pause" class="btn btn-pause">
                    <span class="icon-pause"></span>
                    Pause
                </button>
            </div>

            <div class="sync-status" id="syncStatus">
                <span>🔄</span>
                <span id="statusText">Ready to sync</span>
            </div>

            <div class="users-online" id="usersOnline">
                <span>👥</span>
                <span id="userCount">0 users online</span>
            </div>

            <div class="info-box">
                Share this URL with friends to watch together. All actions sync in real-time!
            </div>

            <div class="chat-container">
                <div class="chat-header">
                    <span>💬</span>
                    <span>Chat</span>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message system">
                        Welcome to TV - Watch Together! Chat with other viewers here.
                    </div>
                </div>
                <div class="chat-input-group">
                    <input
                        type="text"
                        id="chatInput"
                        placeholder="Type a message..."
                        autocomplete="off"
                        maxlength="500">
                    <button id="sendChat" class="btn-send">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Socket.io -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Load YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <!-- Load Media Handler -->
    <script src="/js/media-handler.js"></script>

    <!-- Load Application JavaScript -->
    <script src="/js/app.js"></script>
</body>
</html>
